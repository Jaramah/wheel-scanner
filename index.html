<!DOCTYPE html>
<html>
<head>
    <title>Wheel Scanner</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #0a0a0a;
            color: #00ff00;
        }
        h1 { color: #00ff00; }
        button {
            background: #00ff00;
            color: #0a0a0a;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        button:hover { background: #00cc00; }
        button:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }
        #progress {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        .progress-line {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #00ff00;
            padding-left: 10px;
        }
        .success { color: #00ff00; }
        .error { color: #ff0000; }
        .info { color: #00aaff; }
        #downloadLink {
            margin-top: 20px;
            display: none;
        }
        #downloadLink a {
            color: #00ff00;
            text-decoration: none;
            padding: 10px 20px;
            background: #1a1a1a;
            border-radius: 5px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <h1>🎯 Wheel Strategy Scanner</h1>
    <p>Click the button below to start scanning for wheel strategy opportunities.</p>
    
    <button id="scanBtn" onclick="startScan()">Start Scan</button>
    <button id="statusBtn" onclick="checkStatus()" style="margin-left: 10px; background: #333;">Check Status</button>
    
    <div id="progress"></div>
    <div id="downloadLink"></div>
    
    <script>
        const progressDiv = document.getElementById('progress');
        const scanBtn = document.getElementById('scanBtn');
        const downloadDiv = document.getElementById('downloadLink');
        
        function addProgress(message, type = 'info') {
            const line = document.createElement('div');
            line.className = 'progress-line ' + type;
            line.textContent = new Date().toLocaleTimeString() + ' - ' + message;
            progressDiv.appendChild(line);
            progressDiv.scrollTop = progressDiv.scrollHeight;
        }
        
        function checkStatus() {
            fetch('/status')
                .then(r => r.json())
                .then(data => {
                    if (data.scanning) {
                        addProgress('⏳ Scan is currently running...', 'info');
                    } else {
                        addProgress('✅ No scan running', 'success');
                    }
                });
        }
        
        function startScan() {
            progressDiv.innerHTML = '';
            downloadDiv.innerHTML = '';
            downloadDiv.style.display = 'none';
            scanBtn.disabled = true;
            scanBtn.textContent = 'Scanning...';
            
            addProgress('🚀 Starting scanner...', 'info');
            
            const eventSource = new EventSource('/scan/stream');
            
            eventSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                if (data.status === 'started') {
                    addProgress(data.message, 'info');
                } else if (data.status === 'progress') {
                    addProgress(data.message, 'info');
                } else if (data.status === 'success') {
                    addProgress('✅ Scan completed successfully!', 'success');
                    addProgress('📄 CSV file: ' + data.csv_file, 'success');
                    
                    downloadDiv.innerHTML = '<a href="' + data.download_url + '" download>📥 Download Results CSV</a>';
                    downloadDiv.style.display = 'block';
                    
                    scanBtn.disabled = false;
                    scanBtn.textContent = 'Start Scan';
                    eventSource.close();
                } else if (data.status === 'completed') {
                    addProgress('⚠️ ' + data.message, 'info');
                    scanBtn.disabled = false;
                    scanBtn.textContent = 'Start Scan';
                    eventSource.close();
                } else if (data.status === 'error') {
                    addProgress('❌ Error: ' + data.error, 'error');
                    scanBtn.disabled = false;
                    scanBtn.textContent = 'Start Scan';
                    eventSource.close();
                }
            };
            
            eventSource.onerror = function(err) {
                addProgress('❌ Connection error', 'error');
                scanBtn.disabled = false;
                scanBtn.textContent = 'Start Scan';
                eventSource.close();
            };
        }
    </script>
</body>
</html>
